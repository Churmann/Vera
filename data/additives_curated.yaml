# current uses; the components are digested like ordinary dietary fats and
# acids; no numerical ADI considered necessary. (E 472e DATEM is listed above.)
e472a:
  name: "Acetic acid esters of mono- and diglycerides of fatty acids"
  risk_level: "low"
  evidence_summary: "Acetic acid esters of mono- and diglycerides (E 472a) are emulsifiers. EFSA's 2020 re-evaluation (covering the E 472a-f esters) concluded there is no safety concern at current uses; the components are digested like ordinary dietary fats and acids. No numerical ADI was considered necessary."
  dose_context: "No safety concern was identified at reported use levels for the general population."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/6032"

