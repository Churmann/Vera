# ---- Phosphoric acid and phosphates (E 338-341, E 343, E 450-452) ----
# All covered by EFSA's 2019 group re-evaluation (pub/5674): group ADI of
# 40 mg/kg bw/day expressed as phosphorus; not genotoxic or carcinogenic; the
# concern is total phosphorus intake, which can exceed the ADI in children and
# matters most for people with reduced kidney function.
e338:
  name: "Phosphoric acid"
  risk_level: "moderate"
  evidence_summary: "Phosphoric acid (E 338) is an acidity regulator, used notably in cola drinks. EFSA's 2019 re-evaluation of the phosphates set, for the first time, a group ADI of 40 mg/kg bw/day expressed as phosphorus. Phosphates are not genotoxic or carcinogenic; the concern is total phosphorus intake rather than this additive specifically."
  dose_context: "EFSA estimated that dietary exposure to phosphates may exceed the group ADI for infants, toddlers, children and adolescents. High phosphorus intake is of particular concern for people with reduced kidney function."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5674"

e339:
  name: "Sodium phosphates"
  risk_level: "moderate"
  evidence_summary: "Sodium phosphates (E 339) are acidity regulators, emulsifying salts and stabilisers. EFSA's 2019 re-evaluation of the phosphates set a group ADI of 40 mg/kg bw/day expressed as phosphorus. Phosphates are not genotoxic or carcinogenic; the concern is total phosphorus intake."
  dose_context: "EFSA estimated that exposure to phosphates may exceed the group ADI for infants, toddlers, children and adolescents. High phosphorus intake is of particular concern for people with reduced kidney function; sodium phosphates also add to dietary sodium."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5674"

e340:
  name: "Potassium phosphates"
  risk_level: "moderate"
  evidence_summary: "Potassium phosphates (E 340) are acidity regulators, emulsifying salts and stabilisers. EFSA's 2019 re-evaluation of the phosphates set a group ADI of 40 mg/kg bw/day expressed as phosphorus. Phosphates are not genotoxic or carcinogenic; the concern is total phosphorus intake."
