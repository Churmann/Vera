e102:
  name: "Tartrazine"
  risk_level: "moderate"
  evidence_summary: "Six EU-approved azo dyes, including tartrazine, were linked to increased hyperactivity in children in a 2007 Lancet RCT (McCann et al.). The EU now requires a warning label: 'may have an adverse effect on activity and attention in children.'"
  dose_context: "Effects were observed at doses achievable through normal diet in children. Adults appear less sensitive. The EFSA re-evaluated and confirmed the warning in 2009."
  source_url: "https://doi.org/10.1016/S0140-6736(07)61306-3"

e110:
  name: "Sunset yellow FCF"
  risk_level: "moderate"
  evidence_summary: "One of the six 'Southampton Six' azo dyes associated with hyperactivity in children in the McCann 2007 Lancet trial. EU requires the warning label 'may have an adverse effect on activity and attention in children.'"
  dose_context: "Effects observed at doses of 20-30 mg/day in children combined with sodium benzoate. ADI set at 4 mg/kg bw/day by EFSA (2009)."
  source_url: "https://doi.org/10.1016/S0140-6736(07)61306-3"

e129:
  name: "Allura red AC"
  risk_level: "moderate"
  evidence_summary: "Part of the Southampton Six azo dyes. Associated with hyperactivity in children in the McCann 2007 Lancet study. EU requires the warning label 'may have an adverse effect on activity and attention in children.'"
  dose_context: "ADI set at 7 mg/kg bw/day by EFSA. The hyperactivity effect was observed at intakes of 25-35 mg/day in children."
  source_url: "https://doi.org/10.1016/S0140-6736(07)61306-3"

e211:
  name: "Sodium benzoate"
  risk_level: "moderate"
  evidence_summary: "When combined with certain azo dyes (particularly E102 tartrazine), sodium benzoate was associated with increased hyperactivity in children in the McCann 2007 Lancet study. Also converts to benzene (a carcinogen) when combined with vitamin C (ascorbic acid) in acidic conditions."
  dose_context: "ADI set at 5 mg/kg bw/day by EFSA. The combination effect with azo dyes is the primary concern, not sodium benzoate alone."
  source_url: "https://doi.org/10.1016/S0140-6736(07)61306-3"

e220:
  name: "Sulphur dioxide"
  risk_level: "moderate"
  evidence_summary: "Sulphur dioxide and sulphites can trigger asthma attacks and allergic reactions in sensitive individuals, particularly asthmatics. EU law requires mandatory labelling when present above 10 mg/kg or 10 mg/litre."
  dose_context: "Risk is concentrated in people with asthma (~10% of asthmatics are sensitive). For non-asthmatics, standard dietary exposure is generally safe. ADI: 0.7 mg/kg bw/day (EFSA 2016)."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4526"

e250:
  name: "Sodium nitrite"
  risk_level: "high"
  evidence_summary: "IARC classifies consumption of processed meats (cured with nitrites) as Group 1 carcinogenic to humans, based on sufficient evidence for colorectal cancer. Nitrites react with amines in meat to form nitrosamines, which are potent carcinogens. EFSA (2017) confirmed the risk."
  dose_context: "The carcinogenic risk is linked to processed meat consumption overall (e.g., 50 g/day increases colorectal cancer risk by ~18%), not specifically to nitrite dose. The nitrite itself has an ADI of 0.07 mg/kg bw/day, which is easily exceeded in high processed-meat diets."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4786"

e320:
  name: "Butylated hydroxyanisole (BHA)"
  risk_level: "high"
  evidence_summary: "IARC classifies BHA as Group 2B (possibly carcinogenic to humans), based on animal studies showing stomach tumours at high doses. The US National Toxicology Program lists it as 'reasonably anticipated to be a human carcinogen.'"
  dose_context: "Carcinogenicity was observed in rodents at doses far exceeding typical human dietary exposure. However, given the weight of evidence, many countries have restricted or are reviewing its use. ADI: 0-0.5 mg/kg bw/day (JECFA)."
  source_url: "https://monographs.iarc.who.int/agents-classified-by-the-iarc-monographs/"

e321:
  name: "Butylated hydroxytoluene (BHT)"
  risk_level: "moderate"
  evidence_summary: "Some animal studies suggest BHT may promote tumour growth at high doses, though evidence for human carcinogenicity is not established. EFSA (2012) concluded it was not genotoxic at current exposure levels but called for more data."
  dose_context: "ADI: 0-0.25 mg/kg bw/day (EFSA 2012). Typical dietary exposure is well below this for most consumers."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/2588"

e407:
  name: "Carrageenan"
  risk_level: "moderate"
  evidence_summary: "Degraded carrageenan (poligeenan) causes intestinal inflammation in animal models and is classified as a possible carcinogen (IARC Group 2B). Food-grade carrageenan is not degraded, but concerns remain about degradation in the gut. EFSA (2018) concluded food-grade carrageenan is safe at current intakes but noted uncertainty."
  dose_context: "Evidence comes mainly from animal studies using doses higher than typical dietary exposure. Some researchers advise caution for people with inflammatory bowel disease."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5238"

e415:
  name: "Xanthan gum"
  risk_level: "low"
  evidence_summary: "Xanthan gum is a well-studied polysaccharide fermented by Xanthomonas campestris. EFSA and FDA consider it safe with no ADI needed. It is not absorbed in the digestive tract and acts as dietary fibre."
  dose_context: "No known safety concerns at dietary levels. At very high intakes (>15 g/day), it can cause flatulence and loose stools as with other fibres."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/1729"

e440:
  name: "Pectins"
  risk_level: "low"
  evidence_summary: "Pectin is a naturally occurring polysaccharide found in fruit cell walls. It acts as dietary fibre and has no known toxicity. EFSA and FDA both confirm it is safe with no ADI needed."
  dose_context: "No adverse effects observed at any dietary level. High intakes may reduce mineral absorption slightly due to chelation, but this is not a concern at typical food levels."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/1386"

e621:
  name: "Monosodium glutamate (MSG)"
  risk_level: "low"
  evidence_summary: "MSG is the sodium salt of glutamic acid, an amino acid found naturally in many foods. EFSA (2017) concluded that MSG does not pose a safety concern at current dietary intakes. 'Chinese restaurant syndrome' has not been reproducibly demonstrated in double-blind studies."
  dose_context: "ADI of 30 mg/kg bw/day set by EFSA as a precautionary measure. Average dietary exposure (~2-3 g/day) is well below this. High intakes (>5 g) may cause transient symptoms in sensitive individuals."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4910"

e950:
  name: "Acesulfame K"
  risk_level: "moderate"
  evidence_summary: "Acesulfame K is approved by EFSA and FDA. Some animal studies have raised concerns about effects on insulin response and gut microbiome at high doses, but human evidence is limited. EFSA last evaluated it in 2000 and noted data gaps."
  dose_context: "ADI: 9 mg/kg bw/day (EFSA). Typical consumer exposure is well below this. Concerns are primarily about long-term metabolic effects, which remain understudied."
  source_url: "https://www.efsa.europa.eu/en/topics/topic/sweeteners"

e951:
  name: "Aspartame"
  risk_level: "moderate"
  evidence_summary: "In July 2023, IARC classified aspartame as Group 2B (possibly carcinogenic), based on limited evidence from observational studies. JECFA simultaneously maintained its ADI, stating current evidence does not establish a causal link at typical dietary intakes. People with phenylketonuria (PKU) must avoid it."
  dose_context: "ADI: 40 mg/kg bw/day (JECFA/EFSA). A 70 kg adult would need to consume ~9-14 cans of diet soft drink daily to reach the ADI. The IARC Group 2B classification is based on very limited evidence and does not imply significant risk at normal intakes."
  source_url: "https://www.iarc.who.int/news-events/iarc-monographs-evaluate-the-carcinogenicity-of-aspartame/"

e952:
  name: "Cyclamate"
  risk_level: "high"
  evidence_summary: "Cyclamate was banned in the United States in 1969 after animal studies suggested it may cause bladder cancer (in combination with saccharin). It remains banned in the US and several other countries. It is permitted in the EU at restricted levels."
  dose_context: "ADI: 7 mg/kg bw/day in the EU. The US ban remains in place. Regulatory status varies significantly by country."
  source_url: "https://www.efsa.europa.eu/en/topics/topic/sweeteners"

e954:
  name: "Saccharin"
  risk_level: "moderate"
  evidence_summary: "Saccharin was placed on the US NTP carcinogen list in 1981 due to bladder tumours in male rats, but was delisted in 2000. The mechanism was found to be rat-specific and not applicable to humans. EFSA and FDA now consider it safe at current intakes."
  dose_context: "ADI: 5 mg/kg bw/day (EFSA). Typical dietary exposure is well below this. The carcinogenic effect in rats was caused by a mechanism unique to male rats that does not occur in humans."
  source_url: "https://www.efsa.europa.eu/en/topics/topic/sweeteners"

e160a:
  name: "Beta-carotene"
  risk_level: "low"
  evidence_summary: "Beta-carotene is a natural pigment and precursor to vitamin A. As a food additive, it is generally recognised as safe. High-dose supplements (not food-level additives) were associated with increased lung cancer risk in smokers in two large trials."
  dose_context: "As a food additive, exposure is far below the levels used in the supplement trials (20-30 mg/day vs. typical additive exposure <2 mg/day). No safety concern at food additive levels."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/2036"

e471:
  name: "Mono- and diglycerides of fatty acids"
  risk_level: "low"
  evidence_summary: "Mono- and diglycerides are emulsifiers derived from glycerol and fatty acids (often from palm oil, soy, or sunflower). They are structurally similar to natural fats and are metabolised the same way. EFSA considers them safe with no ADI needed."
  dose_context: "No toxicological concern at dietary levels. The main sustainability concern is sourcing: palm-oil derived versions are associated with deforestation, though this is an environmental rather than health consideration."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/3765"

e955:
  name: "Sucralose"
  risk_level: "low"
  evidence_summary: "Sucralose is a chlorinated sucrose derivative. EFSA and FDA consider it safe. A 2023 study raised concerns about genotoxicity at high doses in mice, but EFSA reviewed it and concluded current evidence does not support a safety concern at dietary intake levels."
  dose_context: "ADI: 15 mg/kg bw/day (EFSA 2017). Typical consumer exposure is well below this. The 2023 genotoxicity findings used very high doses not representative of dietary exposure."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4798"

e960:
  name: "Steviol glycosides"
  risk_level: "low"
  evidence_summary: "Steviol glycosides are natural sweeteners extracted from the Stevia rebaudiana plant. EFSA and FDA/GRAS consider them safe. They are not metabolised by human enzymes and are excreted unchanged."
  dose_context: "ADI: 4 mg/kg bw/day as steviol equivalents (EFSA 2015). Typical dietary exposure is well within this. No adverse effects observed in studies up to the ADI."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4146"

e101:
  name: "Riboflavin (Vitamin B2)"
  risk_level: "low"
  evidence_summary: "Riboflavin (E 101) is vitamin B2, an essential nutrient used as a yellow-orange colour. EFSA re-evaluated it in 2013 and found no safety concern from its use as a food additive; it is not genotoxic, and any excess is excreted in urine."
  dose_context: "Exposure from use as a colour is small relative to normal dietary and supplemental intake of the vitamin. EFSA did not consider a numerical ADI necessary."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/3357"

e150a:
  name: "Plain caramel (Class I)"
  risk_level: "low"
  evidence_summary: "Caramel colours (E 150a-d) are made by controlled heating of carbohydrates. EFSA re-evaluated all four classes in 2011 and set a group ADI of 300 mg/kg bw/day. Plain caramel (Class I), made without ammonia or sulphite reagents, is the simplest form and raised the least concern."
  dose_context: "EFSA's 2012 refined assessment found consumer exposure well below the group ADI for most people. Class I carries none of the by-product concerns associated with the ammonia-process caramels."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/2004"

e150d:
  name: "Sulphite ammonia caramel (Class IV)"
  risk_level: "moderate"
  evidence_summary: "Class IV caramel, the colour used in many cola drinks, is made with ammonium and sulphite compounds and can contain 4-methylimidazole (4-MEI), a process by-product that IARC classifies as possibly carcinogenic (Group 2B). EFSA (2011) set a group ADI of 300 mg/kg bw/day for caramel colours together with limits on by-products."
  dose_context: "EFSA concluded that exposure to caramel colours, including the 4-MEI content, is generally within the group ADI. The 4-MEI carcinogenicity signal comes from high-dose rodent studies; dietary exposure is far lower."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/2004"

e160c:
  name: "Paprika extract (paprika oleoresin)"
  risk_level: "low"
  evidence_summary: "Paprika extract (E 160c) is a red-orange colour obtained from sweet peppers (Capsicum annuum); its main pigments are capsanthin and capsorubin. EFSA re-evaluated it in 2015 and concluded the extract used as a colour does not raise a genotoxicity concern; pigment bioavailability is very low."
  dose_context: "EFSA could not derive a numerical ADI because of limitations in the older toxicity database, but did not identify a safety concern at reported use levels as a food colour."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4320"

e202:
  name: "Potassium sorbate"
  risk_level: "low"
  evidence_summary: "Potassium sorbate (E 202) is the potassium salt of sorbic acid, a widely used preservative against moulds and yeasts. EFSA's 2015 re-evaluation found no evidence of genotoxicity or carcinogenicity and set a group ADI of 11 mg/kg bw/day (expressed as sorbic acid) covering E 200 and E 202."
  dose_context: "EFSA noted that intake could exceed the ADI at the upper end of estimates for high consumers, especially children, prompting a follow-up review. For typical consumers, exposure is within the ADI."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4144"

e270:
  name: "Lactic acid"
  risk_level: "low"
  evidence_summary: "Lactic acid (E 270) is an acidity regulator that occurs naturally in fermented foods and in the body as a normal product of metabolism. JECFA assigned it an ADI 'not limited' (1973, reaffirmed 2001) — the category reserved for substances of very low concern. EFSA's own re-evaluation of the free organic acids is still in progress."
  dose_context: "Lactic acid is not used in foods for young infants because they metabolise the D-isomer poorly — a formulation consideration, not a general toxicity concern."
  source_url: "https://www.inchem.org/documents/jecfa/jeceval/jec_1252.htm"

e296:
  name: "Malic acid"
  risk_level: "low"
  evidence_summary: "Malic acid (E 296) is an acidity regulator and flavour acid that occurs naturally in fruit (notably apples) and in the body's energy metabolism. It has a long history of use and is generally regarded as low concern."
  dose_context: "EFSA opened a re-evaluation of malic acid and malates (E 296, E 350-352) and issued a call for data; a completed EFSA food-additive opinion was not available at the time of writing, so this summary reflects general background rather than a specific re-evaluation."
  source_url: ""
  pending_note: "EFSA's re-evaluation of malic acid and malates (E 296, E 350-352) is currently in progress — a public call for data was issued in 2024 and no completed opinion has been published yet. We will add a sourced summary once it is available."
  note: "SOURCE NEEDED — EFSA re-evaluation of E 296 still in progress (call for data only); no final EFSA opinion URL confirmed."

e300:
  name: "Ascorbic acid (Vitamin C)"
  risk_level: "low"
  evidence_summary: "Ascorbic acid (E 300) is vitamin C, used as an antioxidant. EFSA re-evaluated it (with sodium and calcium ascorbate) in 2015 and found no safety concern from its use as a food additive."
  dose_context: "EFSA considered a numerical ADI unnecessary. Additive use adds little to total intake compared with dietary and supplemental vitamin C. Very high supplemental doses (grams per day) can cause gastrointestinal upset, but not at additive levels."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4087"

e306:
  name: "Tocopherol-rich extract (Vitamin E)"
  risk_level: "low"
  evidence_summary: "Tocopherol-rich extract (E 306) and the related tocopherols (E 307-309) are forms of vitamin E used as antioxidants to stop fats turning rancid. EFSA re-evaluated them in 2015 and did not identify a safety concern at their uses as food additives, with no genotoxicity concern."
  dose_context: "Additive use contributes modestly to overall vitamin E intake. EFSA did not consider a numerical ADI necessary at these use levels."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4247"

e322:
  name: "Lecithins"
  risk_level: "low"
  evidence_summary: "Lecithins (E 322) are natural phospholipid emulsifiers, usually extracted from soya or sunflower. EFSA re-evaluated them in 2017 and concluded there is no safety concern at current uses; lecithins are normal dietary components digested like other fats."
  dose_context: "EFSA considered a numerical ADI unnecessary for the general population. A separate 2020 opinion specifically addressed use in foods for infants below 16 weeks of age."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4742"

e330:
  name: "Citric acid"
  risk_level: "low"
  evidence_summary: "Citric acid (E 330) is among the most common acidity regulators, occurring naturally in citrus fruit and central to the body's energy (Krebs) cycle. JECFA evaluated citric acid together with its calcium, potassium and sodium salts and assigned an ADI 'not limited' — the category reserved for substances of very low toxicity that are normal food constituents or metabolites. EFSA's own re-evaluation of the free acid is still in progress."
  dose_context: "Like other food acids, frequent exposure can contribute to dental enamel erosion — a local effect, not systemic toxicity."
  source_url: "https://www.inchem.org/documents/jecfa/jecmono/v05je24.htm"

e331:
  name: "Sodium citrates"
  risk_level: "low"
  evidence_summary: "Sodium citrates (E 331) are the sodium salts of citric acid, used as acidity regulators, emulsifying salts and sequestrants. JECFA assessed citric acid together with its sodium, potassium and calcium salts and assigned the group an ADI 'not limited', reflecting their status as salts of a normal metabolite. EFSA's own re-evaluation of citric acid and citrates is still in progress."
  dose_context: "As salts of a normal metabolite, sodium citrates are of low toxicological concern; the main practical consideration is their contribution to dietary sodium."
  source_url: "https://www.inchem.org/documents/jecfa/jecmono/v05je24.htm"

e412:
  name: "Guar gum"
  risk_level: "low"
  evidence_summary: "Guar gum (E 412) is a thickener from the endosperm of the guar bean. EFSA's 2017 re-evaluation found no genotoxicity or other safety concern for the general population; it is largely undigested and acts as fermentable fibre."
  dose_context: "EFSA concluded a numerical ADI was not needed. High intakes can cause bloating and laxative effects, as with other soluble fibres. A 2024 follow-up flagged insufficient data specifically for foods for infants and young children."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4669"

e422:
  name: "Glycerol (glycerine)"
  risk_level: "low"
  evidence_summary: "Glycerol (E 422) is a humectant and bulk sweetener that is also a normal building block of dietary fats. EFSA's 2017 re-evaluation found no concern for genotoxicity or carcinogenicity and no safety concern at its uses as a food additive."
  dose_context: "EFSA considered a numerical ADI unnecessary. Very large single doses can have a mild osmotic/laxative effect, but not at typical food-additive levels."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4720"

e450:
  name: "Diphosphates"
  risk_level: "moderate"
  evidence_summary: "Diphosphates (E 450) are phosphate additives used as raising agents, emulsifying salts and stabilisers. In 2019 EFSA set, for the first time, a group ADI for phosphates of 40 mg/kg bw/day expressed as phosphorus. Phosphates are not genotoxic or carcinogenic; the concern is total phosphorus intake."
  dose_context: "EFSA estimated that dietary exposure to phosphates may exceed the group ADI for infants, toddlers and children, and for high consumers generally. High phosphorus intake is of particular concern for people with reduced kidney function."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5674"

e466:
  name: "Carboxymethylcellulose (cellulose gum)"
  risk_level: "low"
  evidence_summary: "Sodium carboxymethylcellulose (E 466), or cellulose gum, is a thickener and stabiliser made from plant cellulose. EFSA's 2018 re-evaluation of the cellulose group found no safety concern; celluloses are not significantly absorbed or broken down in the gut."
  dose_context: "EFSA concluded a numerical ADI was not needed. Research on emulsifiers and the gut microbiome is ongoing, but EFSA did not find a concern established at current intakes. A 2022 follow-up addressed use in foods for infants below 16 weeks of age."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5047"

e472e:
  name: "Diacetyltartaric esters of mono- and diglycerides (DATEM)"
  risk_level: "low"
  evidence_summary: "DATEM (E 472e) is an emulsifier widely used in bread and baked goods, made from glycerol, fatty acids and tartaric acid. EFSA's 2020 re-evaluation (covering the E 472a-f esters) concluded there is no safety concern at current uses; the components are digested like ordinary dietary fats and acids."
  dose_context: "EFSA did not consider a numerical ADI necessary. Older animal studies reporting heart effects used very high doses that EFSA did not find relevant at dietary exposure levels."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/6032"

e500:
  name: "Sodium carbonates"
  risk_level: "low"
  evidence_summary: "Sodium carbonates (E 500) — sodium carbonate and sodium bicarbonate (baking soda) — are acidity regulators and raising agents. JECFA assigned sodium carbonate an ADI 'not limited'; bicarbonate is a normal physiological buffer in the body. (This is an older JECFA evaluation; EFSA has not published a dedicated re-evaluation.)"
  dose_context: "The main practical consideration is the contribution to dietary sodium rather than toxicity of the carbonate itself."
  source_url: "https://www.inchem.org/documents/jecfa/jeceval/jec_2137.htm"

e551:
  name: "Silicon dioxide (silica)"
  risk_level: "moderate"
  evidence_summary: "Silicon dioxide (E 551) is an anti-caking agent (synthetic amorphous silica). EFSA's 2018 re-evaluation found no evidence of toxicity at reported uses but could not confirm a numerical ADI because of gaps in the data, particularly on the nanoparticle fraction of the material."
  dose_context: "EFSA recommended that EU specifications be revised to characterise particle size and nano-scale content. There was no demonstrated harm at dietary exposure, but EFSA flagged uncertainty pending better nanomaterial data; a 2024 follow-up addressed infant foods."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5088"

e100:
  name: "Curcumin"
  risk_level: "low"
  evidence_summary: "Curcumin (E 100) is the yellow-orange pigment from turmeric. EFSA re-evaluated it in 2010 and confirmed an ADI of 3 mg/kg bw/day; it is not genotoxic and showed no carcinogenicity in animal studies."
  dose_context: "EFSA found that high-level intake estimates for some young children could exceed the ADI in certain countries, while adult exposure is generally below it. The pigment is poorly absorbed."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/1679"

e104:
  name: "Quinoline Yellow"
  risk_level: "moderate"
  evidence_summary: "Quinoline Yellow (E 104) is a synthetic colour and one of the 'Southampton Six' dyes linked to increased hyperactivity in some children in the McCann 2007 study. EU law requires the warning 'may have an adverse effect on activity and attention in children.' EFSA's 2009 re-evaluation lowered the ADI to 0.5 mg/kg bw/day."
  dose_context: "EFSA noted intake at maximum use levels could exceed the ADI, especially for children. The behavioural effect was seen with mixtures of colours plus a preservative, not this dye alone."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/1329"

e120:
  name: "Cochineal, carminic acid, carmines"
  risk_level: "low"
  evidence_summary: "Cochineal, carminic acid and carmines (E 120) are red colours derived from the cochineal insect. EFSA re-evaluated them in 2015 and maintained the ADI of 5 mg/kg bw/day, with no genotoxicity concern. As a protein-containing natural extract, it can rarely trigger allergic reactions in sensitive people."
  dose_context: "Exposure is generally below the ADI. EFSA recommended tightening specifications for residual protein and toxic-element impurities."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4288"

e122:
  name: "Azorubine / Carmoisine"
  risk_level: "moderate"
  evidence_summary: "Azorubine/Carmoisine (E 122) is a synthetic azo dye and one of the 'Southampton Six' associated with hyperactivity in some children (McCann 2007). EU law requires the warning 'may have an adverse effect on activity and attention in children.' EFSA's 2009 re-evaluation maintained the ADI of 4 mg/kg bw/day."
  dose_context: "At the 95th percentile, intake for 1-10 year-old children could exceed the ADI under some scenarios. The behavioural effect was observed with colour mixtures, not this dye alone."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/1332"

e124:
  name: "Ponceau 4R"
  risk_level: "moderate"
  evidence_summary: "Ponceau 4R (E 124) is a synthetic azo dye, one of the 'Southampton Six' linked to hyperactivity in some children (McCann 2007). EU law requires the warning 'may have an adverse effect on activity and attention in children.' EFSA's 2009 re-evaluation lowered the ADI to 0.7 mg/kg bw/day."
  dose_context: "EFSA found intake estimates could exceed the ADI for children at maximum use levels. The behavioural signal came from mixtures of additives."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/1328"

e131:
  name: "Patent Blue V"
  risk_level: "low"
  evidence_summary: "Patent Blue V (E 131) is a synthetic triarylmethane colour. EFSA's 2013 re-evaluation concluded it is not a safety concern at current use levels and is not genotoxic. Rare hypersensitivity (allergic-type) reactions have been reported."
  dose_context: "EFSA did not identify a concern at reported uses. It is poorly absorbed from the gut."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/2818"

e132:
  name: "Indigotine / Indigo Carmine"
  risk_level: "low"
  evidence_summary: "Indigotine / Indigo Carmine (E 132) is a synthetic blue colour. EFSA re-evaluated it in 2014 and confirmed the ADI of 5 mg/kg bw/day; it is poorly absorbed and raised no genotoxicity concern."
  dose_context: "Exposure estimates were below the ADI for all population groups."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/3768"

e133:
  name: "Brilliant Blue FCF"
  risk_level: "low"
  evidence_summary: "Brilliant Blue FCF (E 133) is a synthetic blue colour. EFSA's 2010 re-evaluation established an ADI of 6 mg/kg bw/day and found no genotoxicity or carcinogenicity concern."
  dose_context: "Exposure estimates were generally below the ADI. It is poorly absorbed."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/1853"

e150b:
  name: "Caustic sulphite caramel (Class II)"
  risk_level: "low"
  evidence_summary: "Caramel colours (E 150a-d) are made by controlled heating of carbohydrates. EFSA (2011) set a group ADI of 300 mg/kg bw/day. Caustic sulphite caramel (Class II, E 150b) is made with sulphite but without ammonia compounds."
  dose_context: "EFSA's refined assessment found exposure generally within the group ADI. Class II does not carry the ammonia-process by-products of Classes III and IV."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/2004"

e150c:
  name: "Ammonia caramel (Class III)"
  risk_level: "moderate"
  evidence_summary: "Ammonia caramel (Class III, E 150c) is made with ammonia compounds and can contain the by-product 4-methylimidazole (4-MEI), which IARC classifies as possibly carcinogenic (Group 2B). EFSA (2011) set a group ADI of 300 mg/kg bw/day for caramel colours, with a specific limit (THI) for this class."
  dose_context: "EFSA concluded exposure is generally within the group ADI. The by-product concern is based on high-dose rodent studies; dietary exposure is far lower."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/2004"

e160b:
  name: "Annatto (bixin, norbixin)"
  risk_level: "low"
  evidence_summary: "Annatto (E 160b) is an orange-red colour from the seeds of Bixa orellana; its pigments are bixin and norbixin. EFSA's 2016 opinion set ADIs of 6 mg bixin/kg and 0.3 mg norbixin/kg bw/day."
  dose_context: "Bixin exposure was below the ADI for all groups; norbixin could exceed it at the 95th percentile only under proposed extended uses."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4544"

e162:
  name: "Beetroot red (betalains)"
  risk_level: "low"
  evidence_summary: "Beetroot red (E 162) is a natural colour from beetroot, consisting mainly of betalain pigments. EFSA's 2015 re-evaluation could not set a numerical ADI because the toxicological database was limited, but did not identify a safety concern at the reported uses."
  dose_context: "As a normal food-derived pigment with low bioavailability, EFSA considered current dietary exposure not to be of concern."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4318"

e170:
  name: "Calcium carbonate"
  risk_level: "low"
  evidence_summary: "Calcium carbonate (E 170) is a white colour, anti-caking agent and acidity regulator that is also a common calcium source. EFSA's 2011 re-evaluation raised no safety concern at its uses as a food additive."
  dose_context: "EFSA did not consider a numerical ADI necessary. Additive use adds to total calcium intake; concerns about very high calcium apply to supplements, not additive levels."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/2318"

e171:
  name: "Titanium dioxide"
  risk_level: "high"
  evidence_summary: "Titanium dioxide (E 171) is a white colour. In 2021 EFSA concluded it can no longer be considered safe as a food additive because a concern for genotoxicity could not be ruled out, partly due to the nanoparticle fraction. The EU banned its use as a food additive from 2022."
  dose_context: "EFSA could not establish a safe level (no ADI). The concern is potential accumulation and genotoxicity rather than acute toxicity."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/6585"

e172:
  name: "Iron oxides and hydroxides"
  risk_level: "low"
  evidence_summary: "Iron oxides and hydroxides (E 172) are yellow, red, brown and black mineral colours. EFSA's 2015 re-evaluation found them poorly absorbed and did not identify a safety concern at the reported uses, though data gaps prevented a numerical ADI."
  dose_context: "EFSA estimated exposure to be low and recommended updated specifications for soluble iron and toxic-element impurities."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4317"

e210:
  name: "Benzoic acid"
  risk_level: "moderate"
  evidence_summary: "Benzoic acid and benzoates (E 210-213) are preservatives. EFSA's 2016 re-evaluation maintained a group ADI of 5 mg/kg bw/day. Benzoates can trigger non-allergic hypersensitivity in some sensitive individuals, and benzoic acid can form trace benzene if combined with vitamin C under certain conditions."
  dose_context: "EFSA found exposure could exceed the ADI for high-consuming children at the upper estimates. The benzene-formation issue is a manufacturing-control matter."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4433"

e235:
  name: "Natamycin"
  risk_level: "low"
  evidence_summary: "Natamycin (E 235) is an antifungal preservative used only for surface treatment of cheese and dried sausages. EFSA's 2009 opinion concluded its use is not a safety concern and that the risk of promoting antimicrobial resistance is low at authorised uses."
  dose_context: "Exposure is limited because it is applied only to food surfaces and largely removed with the rind. ADI 0.3 mg/kg bw/day."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/1412"

e249:
  name: "Potassium nitrite"
  risk_level: "high"
  evidence_summary: "Potassium nitrite (E 249) is a curing preservative, assessed by EFSA together with sodium nitrite (E 250) in 2017. Nitrites can react with amines to form nitrosamines, some of which are carcinogenic; consumption of nitrite-cured processed meat is classified by IARC as Group 1 (carcinogenic to humans)."
  dose_context: "ADI for nitrite is 0.07 mg/kg bw/day. The cancer risk is linked to overall processed-meat intake rather than nitrite dose alone."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4786"

e251:
  name: "Sodium nitrate"
  risk_level: "moderate"
  evidence_summary: "Sodium nitrate (E 251) is a curing preservative re-evaluated by EFSA in 2017 (with potassium nitrate E 252). Nitrate itself is of low toxicity, but part of it is converted to nitrite in the body, which can form nitrosamines. EFSA confirmed an ADI of 3.7 mg nitrate/kg bw/day."
  dose_context: "Most dietary nitrate comes from vegetables and water rather than additives. The concern relates to endogenous conversion to nitrite."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4787"

e260:
  name: "Acetic acid"
  risk_level: "low"
  evidence_summary: "Acetic acid (E 260) is the acid in vinegar, used as an acidity regulator and preservative, and a normal product of metabolism. It is widely regarded as low concern."
  dose_context: "Acetic acid and its salts (E 260-263) are normal dietary components. As a food acid, frequent exposure can contribute to dental enamel erosion."
  source_url: ""
  note: "SOURCE NEEDED — the 2020 EFSA opinion pub/6032 covers the E 472a-f ESTERS, not free acetic acid (E 260). The re-evaluation of free acetic acid / acetates (E 260-263) appears still ongoing; no completed EFSA opinion URL confirmed."

e280:
  name: "Propionic acid"
  risk_level: "low"
  evidence_summary: "Propionic acid and propionates (E 280-283) are preservatives used mainly against mould in bread and baked goods; propionate is also a normal product of gut fermentation and metabolism. EFSA's 2014 re-evaluation raised no genotoxicity or other safety concern."
  dose_context: "EFSA did not consider a numerical ADI necessary. Intake from additive use is small relative to propionate produced naturally in the gut."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/3779"

e310:
  name: "Propyl gallate"
  risk_level: "low"
  evidence_summary: "Propyl gallate (E 310) is an antioxidant used to stop fats and oils going rancid. EFSA's 2014 re-evaluation set an ADI of 0.5 mg/kg bw/day and found no genotoxicity concern at that level."
  dose_context: "EFSA estimated exposure to be below the ADI for most consumers. The former group ADI shared with octyl and dodecyl gallate was withdrawn in favour of substance-specific values."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/3642"

e334:
  name: "Tartaric acid (L(+)-)"
  risk_level: "low"
  evidence_summary: "L(+)-Tartaric acid (E 334) is an acidity regulator and antioxidant synergist that occurs naturally in grapes. EFSA's 2020 re-evaluation (with the tartrates E 335-337, E 354) raised no safety concern at the reported uses."
  dose_context: "EFSA found exposure not to be of concern. Tartaric acid is poorly absorbed and largely excreted unchanged or metabolised by gut bacteria."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/6030"

e385:
  name: "Calcium disodium EDTA"
  risk_level: "low"
  evidence_summary: "Calcium disodium EDTA (E 385) is a sequestrant that binds metal ions to protect colour and flavour, used in some canned foods, sauces and dressings. JECFA established an ADI of 0-2.5 mg/kg bw (expressed as calcium disodium EDTA). EFSA's own re-evaluation of E 385 is still in progress."
  dose_context: "EDTA can bind dietary minerals, so EU rules restrict its use to specific foods at low levels; at those levels intake stays within the JECFA ADI."
  source_url: "https://www.inchem.org/documents/jecfa/jeceval/jec_311.htm"

e392:
  name: "Extracts of rosemary"
  risk_level: "low"
  evidence_summary: "Extracts of rosemary (E 392) are natural antioxidants used to protect fats and oils from oxidation. They were evaluated as safe when authorised in the EU, and EFSA's 2018 refined exposure assessment found dietary intakes to be within acceptable levels."
  dose_context: "Exposure estimates were below levels of concern across population groups."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5373"

e400:
  name: "Alginic acid and alginates"
  risk_level: "low"
  evidence_summary: "Alginic acid and its salts (E 400-404) are gelling and thickening agents extracted from brown seaweed. EFSA's 2017 re-evaluation found no need for a numerical ADI and no safety concern at the reported uses; they are not significantly absorbed."
  dose_context: "EFSA advised that intake by infants and young children should stay below therapeutic doses at which alginates can affect mineral absorption or cause mild gut effects."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5049"

e405:
  name: "Propylene glycol alginate"
  risk_level: "low"
  evidence_summary: "Propylene glycol alginate (E 405) is a modified alginate used as a thickener and stabiliser (e.g. in some drinks and dressings). EFSA's 2018 re-evaluation set an ADI of 70 mg/kg bw/day and found no safety concern at the reported uses."
  dose_context: "Exposure estimates were generally below the ADI."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5371"

e406:
  name: "Agar"
  risk_level: "low"
  evidence_summary: "Agar (E 406) is a gelling polysaccharide from red seaweed. EFSA's 2016 re-evaluation found no need for a numerical ADI and no safety concern; it is not significantly digested and acts as fibre."
  dose_context: "No adverse effects at dietary levels. Like other gel-forming fibres, very high intakes can have a laxative effect."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4645"

e410:
  name: "Locust bean gum (carob gum)"
  risk_level: "low"
  evidence_summary: "Locust bean (carob) gum (E 410) is a thickener from carob seeds. EFSA's 2017 re-evaluation found no genotoxicity or other safety concern for the general population and concluded a numerical ADI was not needed."
  dose_context: "A 2023 follow-up flagged insufficient data specifically for foods for infants and young children. High intakes can cause mild gut effects as with other soluble fibres."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4646"

e414:
  name: "Acacia gum (gum arabic)"
  risk_level: "low"
  evidence_summary: "Acacia gum (gum arabic, E 414) is a thickener and stabiliser from Acacia trees. EFSA's 2017 re-evaluation found no safety concern and concluded a numerical ADI was not needed; it behaves largely as fermentable fibre."
  dose_context: "No adverse effects at dietary levels. A 2019 follow-up addressed use in foods for infants below 16 weeks of age."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4741"

e417:
  name: "Tara gum"
  risk_level: "low"
  evidence_summary: "Tara gum (E 417) is a thickener from the seeds of the tara tree. EFSA's 2017 re-evaluation found no safety concern at the reported uses and concluded a numerical ADI was not needed."
  dose_context: "It is poorly digested and acts as fibre; no adverse effects at dietary levels."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4863"

e420:
  name: "Sorbitol"
  risk_level: "low"
  evidence_summary: "Sorbitol (E 420) is a sugar alcohol (polyol) used as a sweetener and humectant; like other polyols it is incompletely absorbed. JECFA assigned it an ADI 'not specified', its safest category. EFSA's re-evaluation of the polyols is ongoing."
  dose_context: "Polyols can cause bloating, wind and a laxative effect in large amounts; EU labels carry a warning to that effect."
  source_url: "https://inchem.org/documents/jecfa/jeceval/jec_2187.htm"

e421:
  name: "Mannitol"
  risk_level: "low"
  evidence_summary: "Mannitol (E 421) is a sugar alcohol (polyol) used as a sweetener and anti-caking agent; it is incompletely absorbed."
  dose_context: "As with other polyols, excessive intake can have a laxative effect; EU labels carry a warning."
  source_url: ""
  note: "SOURCE NEEDED — mannitol (E 421) is part of EFSA's ongoing re-evaluation of sweeteners; no completed EFSA opinion URL confirmed."

e473:
  name: "Sucrose esters of fatty acids"
  risk_level: "low"
  evidence_summary: "Sucrose esters of fatty acids (E 473) are emulsifiers made from sucrose and fatty acids. EFSA has assessed them with a group ADI of 40 mg/kg bw/day (shared with sucroglycerides E 474); its 2023 opinion followed up earlier evaluations and addressed use in foods for infants."
  dose_context: "Exposure can approach the ADI for high consumers; the components are digested like ordinary fats and sugars."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/7961"

e476:
  name: "Polyglycerol polyricinoleate (PGPR)"
  risk_level: "low"
  evidence_summary: "Polyglycerol polyricinoleate (PGPR, E 476) is an emulsifier used mainly in chocolate to control flow. EFSA's 2017 re-evaluation found no genotoxicity or other safety concern and set an ADI of 25 mg/kg bw/day."
  dose_context: "Exposure estimates were below the ADI. PGPR is hydrolysed and metabolised like other fats."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4743"

e481:
  name: "Sodium stearoyl-2-lactylate"
  risk_level: "low"
  evidence_summary: "Sodium stearoyl-2-lactylate (E 481) and calcium stearoyl-2-lactylate (E 482) are emulsifiers used in baked goods. EFSA's 2013 re-evaluation found no genotoxicity or other safety concern; an ADI of 20 mg/kg bw/day applies."
  dose_context: "Exposure estimates were within the ADI. The components are digested like ordinary fats and lactic acid."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/3144"

e508:
  name: "Potassium chloride"
  risk_level: "low"
  evidence_summary: "Potassium chloride (E 508) is a seasoning, gelling aid and salt substitute, assessed by EFSA in 2019 with the other chlorides (E 507-511). EFSA found low acute toxicity and no concern for genotoxicity or carcinogenicity."
  dose_context: "It is widely used to reduce sodium. Very high single doses can affect people with impaired kidney function or on certain medications, but normal food use is not a concern."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5751"

e553b:
  name: "Talc"
  risk_level: "low"
  evidence_summary: "Talc (E 553b) is an anti-caking agent (a magnesium silicate mineral). EFSA's 2018 re-evaluation found it very poorly absorbed with no indication of genotoxicity or developmental toxicity; the food additive is asbestos-free by specification."
  dose_context: "EFSA did not set a numerical ADI but found no safety concern at the low levels used in food."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5375"

e575:
  name: "Glucono-delta-lactone"
  risk_level: "low"
  evidence_summary: "Glucono-delta-lactone (E 575) is an acidity regulator and raising-agent acid that converts to gluconic acid in water; gluconic acid is a normal metabolite. JECFA assigned a group ADI 'not specified' to glucono-delta-lactone and the gluconate salts. EFSA's own re-evaluation of gluconic acid and related additives (E 574-579) is ongoing."
  dose_context: "It is widely regarded as low concern at the levels used in food — for example in baking powders, some meat products and tofu."
  source_url: "https://inchem.org/documents/jecfa/jeceval/jec_912.htm"

e627:
  name: "Disodium guanylate"
  risk_level: "low"
  evidence_summary: "Disodium guanylate (E 627) is a ribonucleotide flavour enhancer, usually used together with glutamate (E 621) to boost savoury (umami) taste. JECFA assigned it an ADI 'not specified'. EFSA's own re-evaluation of the ribonucleotides is still in progress."
  dose_context: "It is used at low levels and metabolised like other dietary nucleotides; purine content is a consideration only for people specifically advised to limit purine intake."
  source_url: "https://inchem.org/documents/jecfa/jeceval/jec_668.htm"

e631:
  name: "Disodium inosinate"
  risk_level: "low"
  evidence_summary: "Disodium inosinate (E 631) is a ribonucleotide flavour enhancer, typically combined with glutamate (E 621) to intensify savoury taste. JECFA assigned it an ADI 'not specified'. EFSA's own re-evaluation of the ribonucleotides is still in progress."
  dose_context: "Used at low levels and metabolised like other dietary nucleotides; relevant to purine intake only for people specifically advised to limit it."
  source_url: "https://inchem.org/documents/jecfa/jeceval/jec_670.htm"

e901:
  name: "Beeswax"
  risk_level: "low"
  evidence_summary: "Beeswax (E 901) is a glazing agent used to coat confectionery and as a carrier for flavours. EFSA's 2007 opinion concluded its use as a food additive is not a safety concern."
  dose_context: "Beeswax is poorly absorbed and used in small amounts as a surface coating."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/615"

e903:
  name: "Carnauba wax"
  risk_level: "low"
  evidence_summary: "Carnauba wax (E 903) is a glazing agent from a palm leaf, used to coat sweets, chewing gum and some supplements. EFSA's 2012 re-evaluation set an ADI of 7 mg/kg bw/day and found no safety concern at the reported uses."
  dose_context: "Exposure estimates were below the ADI. It is poorly absorbed and used only as a thin surface coating."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/2880"

e904:
  name: "Shellac"
  risk_level: "low"
  evidence_summary: "Shellac (E 904) is a glazing agent (a resin from the lac insect) used to coat confectionery, fruit and supplements. EFSA's 2024 re-evaluation derived an ADI of 4 mg/kg bw/day for wax-free shellac and found no safety concern at the reported uses."
  dose_context: "Exposure is limited as it is used only as a surface coating."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/8897"

e965:
  name: "Maltitol"
  risk_level: "low"
  evidence_summary: "Maltitol (E 965) is a sugar alcohol (polyol) used as a bulk sweetener; it is partially absorbed and partially fermented in the gut. JECFA assigned it an ADI 'not specified'. EFSA's re-evaluation of the polyols is ongoing."
  dose_context: "As with other polyols, excess intake can cause bloating and a laxative effect; EU labels carry a warning."
  source_url: "https://inchem.org/documents/jecfa/jeceval/jec_1315.htm"

e967:
  name: "Xylitol"
  risk_level: "low"
  evidence_summary: "Xylitol (E 967) is a sugar alcohol (polyol) used as a sweetener, notable for not promoting tooth decay; it is incompletely absorbed. JECFA assigned it an ADI 'not specified'. EFSA's re-evaluation of the polyols is ongoing."
  dose_context: "Excess intake can have a laxative effect; EU labels carry a warning. (Xylitol is toxic to dogs, though that is not a human-safety issue.)"
  source_url: "https://inchem.org/documents/jecfa/jeceval/jec_2404.htm"

e968:
  name: "Erythritol"
  risk_level: "low"
  evidence_summary: "Erythritol (E 968) is a sugar alcohol (polyol) produced by fermentation. EFSA's 2023 re-evaluation found no genotoxicity or other systemic safety concern, identifying gut tolerance (diarrhoea) at high intakes as the main effect."
  dose_context: "EFSA identified a NOAEL for diarrhoea of about 0.5 g/kg bw. Unlike most polyols it is largely absorbed and excreted unchanged in urine. (Some 2023 observational research has raised questions about cardiovascular markers; this was not part of EFSA's additive assessment.)"
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/8430"

e200:
  name: "Sorbic acid"
  risk_level: "low"
  evidence_summary: "Sorbic acid (E 200) is a preservative active against moulds and yeasts, and the parent acid of the sorbates (E 202, E 203). EFSA's 2015 re-evaluation found no evidence of genotoxicity or carcinogenicity and set a group ADI of 11 mg/kg bw/day (expressed as sorbic acid) covering E 200, E 202 and E 203."
  dose_context: "EFSA noted that intake could exceed the ADI at the upper end of estimates for high consumers, especially children, prompting a follow-up review. For typical consumers, exposure is within the ADI."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4144"

e252:
  name: "Potassium nitrate"
  risk_level: "moderate"
  evidence_summary: "Potassium nitrate (E 252) is a curing preservative, re-evaluated by EFSA in 2017 together with sodium nitrate (E 251). Nitrate itself is of low toxicity, but part of it is converted to nitrite in the body, which can react with amines to form nitrosamines. EFSA confirmed an ADI of 3.7 mg nitrate/kg bw/day."
  dose_context: "Most dietary nitrate comes from vegetables and drinking water rather than additives. The concern relates to endogenous conversion to nitrite rather than nitrate itself."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4787"

e1422:
  name: "Acetylated distarch adipate"
  risk_level: "low"
  evidence_summary: "Acetylated distarch adipate (E 1422) is a chemically modified starch used as a thickener and stabiliser (e.g. in canned, chilled and convenience foods). EFSA's 2017 re-evaluation of the modified starches (E 1404-E 1452) found they are not absorbed intact but hydrolysed and fermented in the gut, raised no genotoxicity concern, and concluded there is no safety concern at the reported uses; no numerical ADI was considered necessary (ADI 'not specified')."
  dose_context: "EFSA found no safety concern for the general population at reported use levels. Modified starches are handled by the body much like ordinary dietary starch."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4911"

e1450:
  name: "Starch sodium octenyl succinate"
  risk_level: "low"
  evidence_summary: "Starch sodium octenyl succinate (E 1450) is a modified starch used as an emulsifier and stabiliser (for example in drinks and to encapsulate flavours). EFSA's 2017 re-evaluation of the modified starches (E 1404-E 1452) found them hydrolysed and fermented in the gut with no genotoxicity concern, and no safety concern at the reported uses for the general population; no numerical ADI was considered necessary."
  dose_context: "EFSA noted that the available data did not allow an adequate safety assessment of E 1450 specifically in foods for special medical purposes for infants and young children at the maximum permitted levels — a gap for that narrow use, not a general-population concern."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4911"

# ---- Modified starches (E 1404-E 1452) ----
# All covered by EFSA's 2017 group re-evaluation (pub/4911): not absorbed intact
# but hydrolysed and fermented in the gut, no genotoxicity concern, ADI 'not
# specified', no safety concern at reported uses for the general population.
e1404:
  name: "Oxidised starch"
  risk_level: "low"
  evidence_summary: "Oxidised starch (E 1404) is a modified starch used as a thickener and stabiliser. EFSA's 2017 re-evaluation of the modified starches (E 1404-E 1452) found they are not absorbed intact but hydrolysed and fermented in the gut, raised no genotoxicity concern, and concluded there is no safety concern at the reported uses for the general population; no numerical ADI was considered necessary (ADI 'not specified')."
  dose_context: "EFSA could not adequately assess safety for E 1404 specifically in foods for special medical purposes for infants and young children at the maximum permitted levels — a gap for that narrow use, not a general-population concern."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4911"

e1410:
  name: "Monostarch phosphate"
  risk_level: "low"
  evidence_summary: "Monostarch phosphate (E 1410) is a modified starch used as a thickener and stabiliser. EFSA's 2017 re-evaluation of the modified starches (E 1404-E 1452) found them hydrolysed and fermented in the gut with no genotoxicity concern, and no safety concern at the reported uses for the general population; no numerical ADI was considered necessary (ADI 'not specified')."
  dose_context: "EFSA could not adequately assess safety for E 1410 specifically in foods for special medical purposes for infants and young children at the maximum permitted levels — a gap for that narrow use, not a general-population concern."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4911"

e1412:
  name: "Distarch phosphate"
  risk_level: "low"
  evidence_summary: "Distarch phosphate (E 1412) is a widely used modified starch (thickener and stabiliser, e.g. in sauces, soups and canned foods). EFSA's 2017 re-evaluation of the modified starches (E 1404-E 1452) found them hydrolysed and fermented in the gut with no genotoxicity concern, and no safety concern at the reported uses for the general population; no numerical ADI was considered necessary (ADI 'not specified')."
  dose_context: "EFSA could not adequately assess safety for E 1412 specifically in foods for special medical purposes for infants and young children at the maximum permitted levels — a gap for that narrow use, not a general-population concern."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4911"

e1413:
  name: "Phosphated distarch phosphate"
  risk_level: "low"
  evidence_summary: "Phosphated distarch phosphate (E 1413) is a modified starch used as a thickener and stabiliser. EFSA's 2017 re-evaluation of the modified starches (E 1404-E 1452) found them hydrolysed and fermented in the gut with no genotoxicity concern, and no safety concern at the reported uses for the general population; no numerical ADI was considered necessary (ADI 'not specified')."
  dose_context: "EFSA could not adequately assess safety for E 1413 specifically in foods for special medical purposes for infants and young children at the maximum permitted levels — a gap for that narrow use, not a general-population concern."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/4911"

