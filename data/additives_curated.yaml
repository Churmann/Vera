# ---- Celluloses (E 460-E 469) ----
# All covered by EFSA's 2018 group re-evaluation (pub/5047): not absorbed,
# excreted intact or fermented by gut flora; no need for a numerical ADI; no
# safety concern at the reported uses.
e460:
  name: "Cellulose"
  risk_level: "low"
  evidence_summary: "Cellulose (E 460) — microcrystalline cellulose E 460(i) and powdered cellulose E 460(ii) — is a bulking agent, anti-caking agent and stabiliser, essentially purified plant fibre. EFSA's 2018 re-evaluation of the celluloses found them not absorbed and excreted intact or fermented by gut flora, with no safety concern at the reported uses and no need for a numerical ADI."
  dose_context: "No adverse effects at dietary levels; like other fibres, very high intakes can have mild gut effects."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5047"

e461:
  name: "Methyl cellulose"
  risk_level: "low"
  evidence_summary: "Methyl cellulose (E 461) is a thickener, emulsifier and stabiliser made from plant cellulose. EFSA's 2018 re-evaluation of the celluloses found them not significantly absorbed, with no safety concern at the reported uses and no need for a numerical ADI."
  dose_context: "No adverse effects at dietary levels; like other soluble fibres, very high intakes can have mild laxative effects."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5047"

e462:
  name: "Ethyl cellulose"
  risk_level: "low"
  evidence_summary: "Ethyl cellulose (E 462) is a binder and filler made from plant cellulose. EFSA's 2018 re-evaluation of the celluloses found them not significantly absorbed, with no safety concern at the reported uses and no need for a numerical ADI."
  dose_context: "No adverse effects at dietary levels."
  source_url: "https://www.efsa.europa.eu/en/efsajournal/pub/5047"

