<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Vera{% endblock %}</title>
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo" aria-label="Vera — home">
      <img class="logo-mark" src="/static/icon.svg" alt="" width="32" height="32">
      <span class="logo-text">Vera</span>
    </a>
    {% set path = request.url.path %}
    <nav class="site-nav" aria-label="Primary">
      <a href="/" class="site-nav-link{% if path == '/' or path.startswith('/search') %} is-active{% endif %}">Search</a>
      <a href="/scan" class="site-nav-link{% if path.startswith('/scan') %} is-active{% endif %}">Scan</a>
      <a href="/history" class="site-nav-link{% if path.startswith('/history') %} is-active{% endif %}">History</a>
      <a href="/overview" class="site-nav-link{% if path.startswith('/overview') %} is-active{% endif %}">Overview</a>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <p>Data from <a href="https://world.openfoodfacts.org" target="_blank" rel="noopener">Open Food Facts</a> (ODbL licence). Scores are informational only — not medical advice.</p>
  </footer>
  {% block scripts %}{% endblock %}
</body>
</html>
